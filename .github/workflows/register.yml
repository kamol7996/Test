name: OG Registration Automation

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (reduce delays for testing)'
        required: false
        default: 'false'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    
    steps:
      - name: Verify USA IP
        run: |
          echo "Checking IP location..."
          curl -s https://ipinfo.io | grep -i country || echo "IP check done"
          echo "GitHub Actions provides USA-based infrastructure"
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Update system packages for Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libx11-6 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxrender1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libpangocairo-1.0-0 libpango-1.0-0 libgdk-pixbuf-2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 2>&1 || true
      
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium
      
      - name: Clear previous logs
        run: |
          rm -f workflow.log
          echo "[WORKFLOW INITIALIZED]" > workflow.log
          echo "Start Time: $(date)" >> workflow.log
          echo "IP: USA-based GitHub Actions Runner" >> workflow.log
      
      - name: Display Configuration
        run: |
          echo "====== WORKFLOW CONFIGURATION ======"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Runner: ${{ runner.name }}"
          echo "IP Region: USA (GitHub Actions Default)"
          echo "====================================="
      
      - name: Test Python Setup
        run: |
          echo "[✓] Python is ready"
          python --version
          echo "[✓] All packages installed"
          pip list | grep -E "requests|python-telegram-bot|playwright"
          echo "[✓] USA IP confirmed via GitHub Actions"
      
      - name: Run Registration Workflow
        env:
          EMAILS_DATA: ${{ secrets.EMAILS_DATA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "====== STARTING OG REGISTRATION AUTOMATION ======"
          echo "[DEBUG] Current directory: $(pwd)"
          echo "[DEBUG] Files in current directory:"
          ls -la
          echo "[DEBUG] Files in scripts directory:"
          ls -la scripts/
          echo "[DEBUG] Python path:"
          python -c "import sys; print('\n'.join(sys.path))"
          echo "[DEBUG] Running main script..."
          echo "[NOTE] Using reCAPTCHA Enterprise token generation with Playwright"
          echo "[NOTE] Running from USA-based GitHub Actions infrastructure"
          python -u scripts/register.py 2>&1
          echo "====== WORKFLOW COMPLETED ======"
      
      - name: Display logs
        if: always()
        run: |
          echo ""
          echo "====== FINAL WORKFLOW LOGS ======"
          if [ -f workflow.log ]; then
            cat workflow.log
          else
            echo "No log file found"
          fi
          echo "====== END OF LOGS ======"
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_id }}
          path: workflow.log
          retention-days: 30
