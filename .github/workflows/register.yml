name: OG Registration Automation

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (reduce delays for testing)'
        required: false
        default: 'false'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Clear previous logs
        run: |
          rm -f workflow.log
          echo "[WORKFLOW INITIALIZED]" > workflow.log
          echo "Start Time: $(date)" >> workflow.log
      
      - name: Display Configuration
        run: |
          echo "====== WORKFLOW CONFIGURATION ======"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "====================================="
      
      - name: Run Registration Workflow
        env:
          EMAILS_DATA: ${{ secrets.EMAILS_DATA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RECAPTCHA_TOKEN: ${{ secrets.RECAPTCHA_TOKEN }}
        run: |
          echo "====== STARTING OG REGISTRATION AUTOMATION ======"
          python scripts/register.py
          echo "====== WORKFLOW COMPLETED ======"
      
      - name: Display logs
        if: always()
        run: |
          echo ""
          echo "====== FINAL WORKFLOW LOGS ======"
          if [ -f workflow.log ]; then
            cat workflow.log
          else
            echo "No log file found"
          fi
          echo "====== END OF LOGS ======"
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_id }}
          path: workflow.log
          retention-days: 30
